# Zero-key override for smoke testing.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml up --build
#
# Deliberately blanks every external API key so you can verify that all
# fallbacks in CHANGES.md trigger correctly on first-boot with no secrets.

version: "3.8"

services:
  backend:
    environment:
      - GEMINI_API_KEY=
      - NEWS_API_KEY=
      - ALPHA_VANTAGE_KEY=
      - UPSTASH_REDIS_URL=
      - LANGFUSE_PUBLIC_KEY=
      - LANGFUSE_SECRET_KEY=
      - OBSERVABILITY_ENABLED=false
      - USE_MCP=true
      # Qdrant IS available (its own service) so RAG init runs
      - QDRANT_URL=http://qdrant:6333
    # Keep the container alive after startup so you can curl it
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info
